# Netlify configuration
[build]
  command = "cd server && npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Redirect all /api/* requests to serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/server/health"
  status = 200

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["serverless-http", "express", "mongoose", "jsonwebtoken", "cookie-parser"]
